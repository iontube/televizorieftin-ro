name: Daily Rebuild
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scripts/update-sitemap.mjs
      - run: node scripts/generate-redirects.mjs
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=televizorieftin-ro --branch=main --commit-dirty=true
